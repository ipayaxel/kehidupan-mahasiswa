<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Web Saya</title>
    <style>
        /* CSS Dasar untuk mempercantik tampilan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #4a90e2;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #357abd;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background-color: #333;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Selamat Datang di Website Saya</h1>
        <p>Sebuah template HTML5 sederhana, bersih, dan responsif.</p>
    </header>

    <main>
        <div class="card">
            <h2>Tentang Halaman Ini</h2>
            <p>Ini adalah berkas <code>index.html</code> dasar. Kamu bisa mengubah teks ini, menambahkan gambar, atau membuat komponen baru sesuai dengan kebutuhan proyekmu.</p>
            
            <button id="btnSapaan">Klik Saya!</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Hak Cipta Dilindungi.</p>
    </footer>

    <script>
        // JavaScript Sederhana untuk interaksi
        document.getElementById('btnSapaan').addEventListener('click', function() {
            alert('Halo! Terima kasih telah berkunjung. Selamat coding!');
        });
    </script>

</body>
</html>
